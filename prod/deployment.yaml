apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: prod-app
  template:
    metadata:
      labels:
        app: prod-app
    spec:
      containers:
        - name: prod-container
          image: europe-west4-docker.pkg.dev/qwiklabs-gcp-04-4b3abc73b08c/my-repository/hello-cloudbuild:v1.0
          ports:
            - containerPort: 8080
